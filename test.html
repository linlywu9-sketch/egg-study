<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>测试</title>
<style>
body{font-family:sans-serif;padding:20px;background:#fff8f0}
.tab{display:none;padding:40px;background:#fff;border-radius:16px;text-align:center;font-size:24px}
.tab.active{display:block}
.nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:#fff;padding:10px}
.nav button{flex:1;padding:12px;border:none;background:#e8e0d8;margin:4px;border-radius:12px;font-size:16px;cursor:pointer}
.nav button.active{background:#a66cff;color:#fff}
</style>
</head>
<body>
<div id="t1" class="tab active">🍅 番茄钟界面</div>
<div id="t2" class="tab">📋 任务界面</div>
<div id="t3" class="tab">🇬🇧 语法界面</div>
<nav class="nav">
  <button class="active" onclick="sw('t1',this)">专注</button>
  <button onclick="sw('t2',this)">任务</button>
  <button onclick="sw('t3',this)">语法</button>
</nav>
<script>
function sw(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
</script>
</body>
</html>
